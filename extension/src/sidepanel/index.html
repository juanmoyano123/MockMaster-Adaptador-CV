<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>MockMaster</title>
  <!--
    styles.css is generated by MiniCssExtractPlugin from the sidepanel bundle.
    The output filename is sidepanel/index.css, but we reference it here as
    styles.css and use CopyWebpackPlugin to rename it in dist/.

    Actually, webpack outputs the CSS as sidepanel/index.css (matching the
    entry key "sidepanel/index"). We reference it directly.
  -->
  <link rel="stylesheet" href="index.css">
</head>
<body>
  <div id="root"></div>
  <!--
    index.js is the bundled React app produced by webpack from
    src/sidepanel/index.tsx.  The bundle is output as sidepanel/index.js.
  -->
  <script src="index.js"></script>
</body>
</html>
